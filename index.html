<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whisky Quiz - Amber Palette</title>
    <style>
        :root { --primary-color: #D2691E; --bg-color: #1a1a1a; --card-bg: #2d2d2d; --text-color: #f5f5f5; }
        body { font-family: sans-serif; background: var(--bg-color); color: var(--text-color); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        #quiz-app { width: 90%; max-width: 500px; background: var(--card-bg); padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .level-menu { display: grid; gap: 15px; text-align: center; }
        .level-btn { background: #3d3d3d; border: 2px solid var(--primary-color); color: white; padding: 15px; border-radius: 10px; cursor: pointer; font-size: 1.1em; transition: 0.3s; }
        .level-btn:hover { background: var(--primary-color); }
        .hidden { display: none; }
        .progress { color: var(--primary-color); margin-bottom: 10px; font-size: 0.9em; }
        .question { font-size: 1.2em; font-weight: bold; margin-bottom: 20px; line-height: 1.4; }
        .options { display: grid; gap: 10px; }
        .option-btn { background: #3d3d3d; border: 1px solid #555; color: white; padding: 12px; border-radius: 8px; text-align: left; cursor: pointer; width: 100%; font-size: 1em; }
        .correct { background: #2e7d32 !important; border-color: #4caf50 !important; }
        .wrong { background: #c62828 !important; border-color: #ef5350 !important; }
        #feedback { margin-top: 20px; padding: 15px; background: #383838; border-left: 5px solid var(--primary-color); display: none; }
        .next-btn { margin-top: 20px; width: 100%; padding: 15px; background: var(--primary-color); border: none; color: white; border-radius: 8px; cursor: pointer; font-weight: bold; display: none; }
    </style>
</head>
<body>

<div id="quiz-app">
    <div id="level-select" class="level-menu">
        <h2 style="color:var(--primary-color)">Amber Palette<br>Whisky Quiz</h2>
        <p>挑戦するレベルを選んでください</p>
        <button class="level-btn" onclick="startQuiz('初級')">初級</button>
        <button class="level-btn" onclick="startQuiz('中級')">中級</button>
        <button class="level-btn" onclick="startQuiz('上級')">上級</button>
        <button class="level-btn" onclick="startQuiz('カルト級')">カルト級</button>
    </div>

    <div id="quiz-container" class="hidden">
        <div class="progress">Level: <span id="display-level"></span> | Question <span id="current-idx">1</span></div>
        <div id="question-text" class="question"></div>
        <div id="options-container" class="options"></div>
        <div id="feedback">
            <div id="result-text" style="font-weight:bold; margin-bottom:5px;"></div>
            <div id="rationale-text" style="font-size:0.95em; color: #ccc;"></div>
        </div>
        <button id="next-btn" class="next-btn" onclick="nextQuestion()">次の問題へ</button>
    </div>
</div>

<script>
let allQuizData = [];
let filteredQuiz = [];
let currentIdx = 0;
let score = 0;

// JSONを読み込む（fetch）
async function loadData() {
    try {
        const response = await fetch('quizData.json');
        allQuizData = await response.json();
    } catch (e) {
        console.error("JSONの読み込み失敗:", e);
        alert("データが見つかりません。サーバー上で実行してください。");
    }
}

async function startQuiz(lv) {
    if(allQuizData.length === 0) await loadData();
    filteredQuiz = allQuizData.filter(d => d.level === lv);
    
    if(filteredQuiz.length === 0) {
        alert("このレベルの問題は準備中です。");
        return;
    }

    currentIdx = 0;
    score = 0;
    document.getElementById('display-level').innerText = lv;
    document.getElementById('level-select').classList.add('hidden');
    document.getElementById('quiz-container').classList.remove('hidden');
    showQuestion();
}

function showQuestion() {
    const q = filteredQuiz[currentIdx];
    document.getElementById('current-idx').innerText = `${currentIdx + 1} / ${filteredQuiz.length}`;
    document.getElementById('question-text').innerText = q.q;
    const container = document.getElementById('options-container');
    container.innerHTML = '';
    
    q.a.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerText = opt;
        btn.onclick = () => check(i);
        container.appendChild(btn);
    });
    
    document.getElementById('feedback').style.display = 'none';
    document.getElementById('next-btn').style.display = 'none';
}

function check(idx) {
    const q = filteredQuiz[currentIdx];
    const btns = document.getElementsByClassName('option-btn');
    for(let b of btns) b.disabled = true;

    if(idx === q.c) {
        btns[idx].classList.add('correct');
        document.getElementById('result-text').innerText = "正解！";
        score++;
    } else {
        btns[idx].classList.add('wrong');
        btns[q.c].classList.add('correct');
        document.getElementById('result-text').innerText = "不正解...";
    }
    
    document.getElementById('rationale-text').innerText = q.r;
    document.getElementById('feedback').style.display = 'block';
    document.getElementById('next-btn').style.display = 'block';
}

function nextQuestion() {
    currentIdx++;
    if(currentIdx < filteredQuiz.length) {
        showQuestion();
    } else {
        document.getElementById('quiz-container').innerHTML = `
            <div style="text-align:center">
                <h2 style="color:var(--primary-color)">Finish!</h2>
                <p>スコア: ${score} / ${filteredQuiz.length}</p>
                <button onclick="location.reload()" class="level-btn">メニューに戻る</button>
            </div>`;
    }
}

// 起動時に読み込み開始
loadData();
</script>
</body>
</html>
