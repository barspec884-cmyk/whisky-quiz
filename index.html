<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whisky Quiz - Amber Palette</title>

<style>
:root {
  --primary-color:#D2691E;
  --bg-color:#1a1a1a;
  --card-bg:#2d2d2d;
  --text-color:#f5f5f5;
}
body{
  font-family:'Helvetica Neue',Arial,sans-serif;
  background:var(--bg-color);
  color:var(--text-color);
  margin:0;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}
#quiz-app{
  width:90%;
  max-width:500px;
  background:var(--card-bg);
  padding:30px;
  border-radius:20px;
  box-shadow:0 20px 50px rgba(0,0,0,.6);
  position:relative;
}
.hidden{display:none;}

.level-menu{display:grid;gap:15px;text-align:center;}
.level-btn{
  background:#3d3d3d;
  border:2px solid var(--primary-color);
  color:white;
  padding:18px;
  border-radius:12px;
  cursor:pointer;
  font-size:1.1em;
  font-weight:bold;
}
.level-btn:hover{background:var(--primary-color);}

.progress{
  color:var(--primary-color);
  font-size:.85em;
  margin-bottom:10px;
  letter-spacing:1px;
}

.question{
  font-size:1.25em;
  font-weight:bold;
  margin-bottom:25px;
  min-height:80px;
}

.options{display:grid;gap:12px;}

.option-btn{
  background:#3d3d3d;
  border:1px solid #555;
  color:white;
  padding:15px;
  border-radius:10px;
  cursor:pointer;
}

#feedback{
  margin-top:25px;
  padding:20px;
  background:rgba(255,255,255,.05);
  border-left:4px solid var(--primary-color);
  display:none;
}

.next-btn{
  margin-top:25px;
  width:100%;
  padding:18px;
  background:var(--primary-color);
  border:none;
  color:white;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
  display:none;
}

.result-screen{text-align:center;}
.rank-title{
  font-size:2em;
  color:var(--primary-color);
  margin-bottom:10px;
  font-weight:900;
}

.praise-msg{
  background:#383838;
  padding:20px;
  border-radius:10px;
  margin-bottom:30px;
}

.home-btn{
  background:transparent;
  border:1px solid #888;
  color:#aaa;
  padding:12px 20px;
  border-radius:8px;
  cursor:pointer;
}
.home-btn:hover{
  color:white;
  border-color:white;
}
</style>
</head>

<body>

<div id="quiz-app">

  <!-- レベル選択 -->
  <div id="level-select" class="level-menu">
    <h1 style="color:var(--primary-color);margin-bottom:5px;">Amber Palette</h1>
    <h3 style="margin-top:0;opacity:.7;">Whisky Quiz Master</h3>
    <button class="level-btn" onclick="startQuiz('初級')">初級</button>
    <button class="level-btn" onclick="startQuiz('中級')">中級</button>
    <button class="level-btn" onclick="startQuiz('上級')">上級</button>
    <button class="level-btn" onclick="startQuiz('カルト級')">カルト級</button>
    <button class="level-btn" onclick="startQuiz('組み合わせ')">組み合わせ</button>
  </div>

  <!-- クイズ画面 -->
  <div id="quiz-container" class="hidden">

    <!-- ★ 常設戻りボタン -->
    <button class="home-btn" onclick="confirmHome()" style="margin-bottom:15px;">
      ← ホームへ戻る
    </button>

    <div class="progress">
      <span id="display-level"></span> ｜ QUESTION <span id="current-num"></span>
    </div>

    <div id="question-text" class="question"></div>
    <div id="options-container" class="options"></div>

    <div id="feedback">
      <div id="result-text" style="font-weight:bold;margin-bottom:8px;"></div>
      <div id="rationale-text" style="font-size:.9em;color:#ccc;"></div>
    </div>

    <button id="next-btn" class="next-btn" onclick="handleNext()">次の問題へ進む</button>
  </div>

  <!-- 結果画面 -->
  <div id="result-container" class="hidden result-screen">
    <div id="rank-name" class="rank-title"></div>
    <div style="font-size:1.2em;margin-bottom:20px;">
      正解数: <span id="final-score"></span>
    </div>
    <div id="praise-message" class="praise-msg"></div>
    <button class="home-btn" onclick="goHome()">ホームへ戻る</button>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script src="startQuiz.js"></script>

<script>
function goHome(){
  document.getElementById("quiz-container").classList.add("hidden");
  document.getElementById("result-container").classList.add("hidden");
  document.getElementById("level-select").classList.remove("hidden");

  // 状態初期化（安全）
  document.getElementById("feedback").style.display="none";
  document.getElementById("next-btn").style.display="none";
  document.getElementById("options-container").innerHTML="";
}

function confirmHome(){
  if(confirm("クイズを中断してホームへ戻りますか？")){
    goHome();
  }
}
</script>

</body>
</html>
