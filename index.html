<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whisky Quiz - Amber Palette</title>
    <style>
        :root { --primary-color: #D2691E; --bg-color: #1a1a1a; --card-bg: #2d2d2d; --text-color: #f5f5f5; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--bg-color); color: var(--text-color); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow-x: hidden; }
        #quiz-app { width: 90%; max-width: 500px; background: var(--card-bg); padding: 30px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.6); position: relative; overflow: hidden; }
        
        #timer-container { position: absolute; top: 0; left: 0; width: 100%; height: 6px; background: #444; display: none; }
        #timer-bar { height: 100%; width: 100%; background: var(--primary-color); transition: linear; }

        .level-menu { display: grid; gap: 15px; text-align: center; }
        .level-btn { background: #3d3d3d; border: 2px solid var(--primary-color); color: white; padding: 18px; border-radius: 12px; cursor: pointer; font-size: 1.1em; transition: 0.3s; font-weight: bold; }
        .level-btn:disabled { border-color: #555; color: #777; cursor: not-allowed; opacity: 0.5; }
        .level-btn:not(:disabled):hover { background: var(--primary-color); box-shadow: 0 0 15px var(--primary-color); }

        .hidden { display: none; }
        .progress { color: var(--primary-color); margin-bottom: 15px; font-size: 0.85em; letter-spacing: 1px; }
        .question { font-size: 1.25em; font-weight: bold; margin-bottom: 25px; line-height: 1.5; min-height: 80px; }
        .options { display: grid; gap: 12px; }
        
        .option-btn { background: #3d3d3d; border: 1px solid #555; color: white; padding: 15px; border-radius: 10px; text-align: left; cursor: pointer; font-size: 1em; transition: 0.2s; z-index: 10; width: 100%; }
        .option-btn:not(:disabled):hover { border-color: var(--primary-color); background: #444; }

        .matching-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .matching-column { display: flex; flex-direction: column; gap: 10px; }
        .match-btn { background: #3d3d3d; border: 1px solid #555; color: white; padding: 12px; border-radius: 8px; cursor: pointer; font-size: 0.85em; transition: 0.2s; text-align: center; min-height: 60px; display: flex; align-items: center; justify-content: center; line-height: 1.3; }
        .match-btn.selected { border-color: var(--primary-color); background: #5a3d2b; box-shadow: 0 0 10px var(--primary-color); }
        .match-btn.matched { background: #1b4d3e !important; border-color: #2e7d32 !important; cursor: default; opacity: 0.7; }

        .correct { background: #2e7d32 !important; border-color: #4caf50 !important; }
        .wrong { background: #c62828 !important; border-color: #ef5350 !important; }
        
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            50% { transform: translateX(8px); }
            75% { transform: translateX(-8px); }
            100% { transform: translateX(0); }
        }
        .shake { animation: shake 0.3s ease-in-out; }

        #feedback { margin-top: 25px; padding: 20px; background: rgba(255,255,255,0.05); border-left: 4px solid var(--primary-color); border-radius: 4px; display: none; }
        .next-btn { margin-top: 25px; width: 100%; padding: 18px; background: var(--primary-color); border: none; color: white; border-radius: 12px; cursor: pointer; font-weight: bold; display: none; }

        .result-screen { text-align: center; }
        .rank-title { font-size: 2em; color: var(--primary-color); margin-bottom: 10px; font-weight: 900; }
        .praise-msg { font-size: 1.1em; line-height: 1.6; margin-bottom: 30px; background: #383838; padding: 20px; border-radius: 10px; }
        .home-btn { background: transparent; border: 1px solid #888; color: #888; padding: 12px 20px; border-radius: 8px; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .home-btn:hover { color: white; border-color: white; }
    </style>
</head>
<body>

<div id="quiz-app">
    <div id="timer-container"><div id="timer-bar"></div></div>

    <div id="level-select" class="level-menu">
        <h1 style="color:var(--primary-color); margin-bottom:5px;">Amber Palette</h1>
        <h3 style="margin-top:0; opacity:0.7;">Whisky Quiz Master</h3>
        <button id="btn-初級" class="level-btn" onclick="startQuiz('初級')">初級</button>
        <button id="btn-中級" class="level-btn" onclick="startQuiz('中級')">中級</button>
        <button id="btn-上級" class="level-btn" onclick="startQuiz('上級')">上級</button>
        <button id="btn-カルト級" class="level-btn" onclick="startQuiz('カルト級')">カルト級</button>
        <button id="btn-組み合わせ" class="level-btn" onclick="startQuiz('組み合わせ')">組み合わせ</button>
    </div>

    <div id="quiz-container" class="hidden">
        <div class="progress"><span id="display-level"></span> ｜ QUESTION <span id="current-num"></span></div>
        <div id="question-text" class="question"></div>
        <div id="options-container" class="options"></div>
        <div id="feedback">
            <div id="result-text" style="font-weight:bold; margin-bottom:8px; font-size:1.1em;"></div>
            <div id="rationale-text" style="font-size:0.9em; color: #ccc; line-height:1.4;"></div>
        </div>
        <button id="next-btn" class="next-btn" onclick="handleNext()">次の問題へ進む</button>
    </div>

    <div id="result-container" class="hidden result-screen">
        <div id="rank-name" class="rank-title"></div>
        <div style="font-size: 1.2em; margin-bottom: 20px;">正解数: <span id="final-score"></span></div>
        <div id="praise-message" class="praise-msg"></div>
        <button class="home-btn" onclick="goHome()">ホームへ戻る</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
// --- 音声設定 ---
const sounds = {
    correct: new Audio("correct.mp3"), //
    incorrect: new Audio("incorrect.mp3"), //
    cheers: new Audio("cheers.mp3"), //
    countdown: new Audio("countdown.mp3"), //
    timeup: new Audio("sinkingtime.mp3") //
};

function playSound(name) {
    if (!sounds[name]) return;
    sounds[name].currentTime = 0;
    sounds[name].play().catch(() => {});
}

function stopSound(name) {
    if (!sounds[name]) return;
    sounds[name].pause();
    sounds[name].currentTime = 0;
}

let allQuizData = [];
let filteredQuiz = [];
let currentIdx = 0;
let score = 0;
let timerId = null;
let countdownInterval = null; // カウントダウン音用
let timeLimit = 15;
let selectedLeft = null;
let matchedCount = 0;

const ranks = [
    { threshold: 100, name: "琥珀の守護神", msg: "完璧です！" },
    { threshold: 80, name: "至高の鑑定士", msg: "素晴らしい！" },
    { threshold: 50, name: "熱心な愛好家", msg: "なかなかの腕前ですね。" },
    { threshold: 0, name: "琥珀色の探求者", msg: "伸び代しかありません！" }
];

async function loadData() {
    try {
        const response = await fetch('quizData.json');
        allQuizData = await response.json();
    } catch (e) { console.error(e); }
}

function startQuiz(lv) {
    filteredQuiz = allQuizData.filter(d => d.level === lv);
    currentIdx = 0; score = 0;
    timeLimit = (lv === '上級' || lv === 'カルト級') ? 30 : 15;
    document.getElementById('display-level').innerText = lv;
    document.getElementById('level-select').classList.add('hidden');
    document.getElementById('quiz-container').classList.remove('hidden');
    document.getElementById('timer-container').style.display = (lv === '組み合わせ') ? 'none' : 'block';
    showQuestion();
}

function showQuestion() {
    const q = filteredQuiz[currentIdx];
    document.getElementById('current-num').innerText = `${currentIdx + 1} / ${filteredQuiz.length}`;
    document.getElementById('question-text').innerText = q.q;
    const container = document.getElementById('options-container');
    container.innerHTML = '';
    document.getElementById('feedback').style.display = 'none';
    document.getElementById('next-btn').style.display = 'none';

    if (q.type === "matching") {
        matchedCount = 0; selectedLeft = null;
        renderMatching(q, container);
    } else {
        q.a.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => check(i);
            container.appendChild(btn);
        });
        startTimer();
    }
}

function renderMatching(q, container) {
    const grid = document.createElement('div'); grid.className = 'matching-grid';
    const leftCol = document.createElement('div'); leftCol.className = 'matching-column';
    const rightCol = document.createElement('div'); rightCol.className = 'matching-column';
    const shuffledRight = [...q.pairs].sort(() => Math.random() - 0.5);

    q.pairs.forEach(p => {
        const b = document.createElement('button'); b.className = 'match-btn'; b.innerText = p.left;
        b.onclick = () => {
            document.querySelectorAll('.matching-column:first-child .match-btn').forEach(x => x.classList.remove('selected'));
            b.classList.add('selected'); selectedLeft = { b, id: p.id };
        };
        leftCol.appendChild(b);
    });

    shuffledRight.forEach(p => {
        const b = document.createElement('button'); b.className = 'match-btn'; b.innerText = p.right;
        b.onclick = () => {
            if(!selectedLeft) return;
            if(selectedLeft.id === p.id) {
                playSound('correct'); //
                selectedLeft.b.classList.replace('selected', 'matched');
                b.classList.add('matched'); selectedLeft = null; matchedCount++;
                if(matchedCount === q.pairs.length) { score++; showFeedback(true, q.r, "COMPLETED!"); }
            } else {
                playSound('incorrect'); //
                b.style.borderColor = "#ef5350"; setTimeout(() => b.style.borderColor = "#555", 500);
            }
        };
        rightCol.appendChild(b);
    });
    grid.append(leftCol, rightCol); container.appendChild(grid);
}

function startTimer() {
    const bar = document.getElementById('timer-bar');
    bar.style.transition = 'none'; bar.style.width = '100%'; void bar.offsetWidth;
    bar.style.transition = `width ${timeLimit}s linear`; bar.style.width = '0%';

    clearTimeout(timerId);
    clearInterval(countdownInterval);

    // カウントダウン音のループ開始（毎秒再生）
    countdownInterval = setInterval(() => playSound('countdown'), 1000); //

    timerId = setTimeout(() => {
        clearInterval(countdownInterval);
        check(-1);
    }, timeLimit * 1000);
}

function check(idx) {
    clearTimeout(timerId);
    clearInterval(countdownInterval); // カウントダウン音を停止

    const q = filteredQuiz[currentIdx];
    const btns = document.getElementsByClassName('option-btn');
    for(let b of btns) b.disabled = true;

    if(idx === q.c) {
        if(btns[idx]) btns[idx].classList.add('correct');
        playSound('correct'); //
        showFeedback(true, q.r, "CORRECT"); score++;
    } else {
        if(idx !== -1 && btns[idx]) btns[idx].classList.add('wrong');
        if(btns[q.c]) btns[q.c].classList.add('correct');
        
        if (idx === -1) {
            playSound('timeup'); //
        } else {
            playSound('incorrect'); //
        }
        
        const app = document.getElementById('quiz-app');
        app.classList.add('shake'); setTimeout(() => app.classList.remove('shake'), 300);
        showFeedback(false, q.r, idx === -1 ? "TIME UP" : "INCORRECT");
    }
}

function showFeedback(isCorrect, rationale, status) {
    const resTxt = document.getElementById('result-text');
    resTxt.innerText = status; resTxt.style.color = isCorrect ? "#4caf50" : "#ef5350";
    document.getElementById('rationale-text').innerText = rationale;
    document.getElementById('feedback').style.display = 'block';
    document.getElementById('next-btn').style.display = 'block';
}

function handleNext() {
    currentIdx++;
    if(currentIdx < filteredQuiz.length) showQuestion(); else showResult();
}

function showResult() {
    document.getElementById('timer-container').style.display = 'none';
    document.getElementById('quiz-container').classList.add('hidden');
    document.getElementById('result-container').classList.remove('hidden');

    const percent = Math.round((score / filteredQuiz.length) * 100);
    document.getElementById('final-score').innerText = `${score} / ${filteredQuiz.length}`;
    const rank = ranks.find(r => percent >= r.threshold);
    document.getElementById('rank-name').innerText = rank.name;
    document.getElementById('praise-message').innerText = rank.msg;

    playSound('cheers'); //
    confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#D2691E', '#FFD700', '#F5F5F5'] });
}

function goHome() {
    document.getElementById('result-container').classList.add('hidden');
    document.getElementById('level-select').classList.remove('hidden');
}

loadData();
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script src="startQuiz.js"></script>

</body>
</html>
